name: CI

on:
  push:
    branches: [main, production-v1]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ["22.12.0", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - name: Verify packed CLI in a clean consumer project
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(npm pack --silent)"
          consumer="$(mktemp -d)"
          cd "$consumer"
          npm init --yes >/dev/null
          npm install --ignore-scripts "$GITHUB_WORKSPACE/$tarball"
          ./node_modules/.bin/zts --version
